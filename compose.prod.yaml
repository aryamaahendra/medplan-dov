services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: latsar-web:prod
    restart: unless-stopped
    ports:
      - '${APP_PORT:-80}:8000'
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: 'true'
      # FrankenPHP options
      CADDY_GLOBAL_OPTIONS: 'debug'
      SERVER_NAME: ':8000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - latsar-network

  worker:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: latsar-web:prod
    restart: unless-stopped
    command: ['php', 'artisan', 'queue:work', '--tries=3']
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - latsar-network

  scheduler:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: latsar-web:prod
    restart: unless-stopped
    command: ['php', 'artisan', 'schedule:work']
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - latsar-network

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - latsar-network

  redis:
    image: redis:alpine
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      retries: 3
      timeout: 5s
    networks:
      - latsar-network

networks:
  latsar-network:
    driver: bridge

volumes:
  db-data:
